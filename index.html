<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
const today = new Date();
const expireDate = new Date();
expireDate.setMonth(today.getMonth()+1); // 1 tháng
const keys = [];

// Tạo 100 key random 8 ký tự
function genRandomKey() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let str = '';
    for(let i=0;i<8;i++) str+=chars[Math.floor(Math.random()*chars.length)];
    return str;
}
for(let i=0;i<100;i++){
    let k = "PhamSon-ViP-" + genRandomKey();
    let hash = CryptoJS.SHA256(k + expireDate.toISOString()).toString();
    keys.push({key:k, hash:hash, expire:expireDate.toISOString()});
}

function checkKey(){
    const input = document.getElementById("keyInput").value.trim();
    let valid = false;
    for(let k of keys){
        if(CryptoJS.SHA256(input + k.expire).toString()===k.hash){
            valid = true;
            break;
        }
    }
    if(valid){ 
        document.getElementById("loginContainer").style.display="none";
        document.getElementById("menuContainer").style.display="flex";
        alert("✅ Đăng nhập thành công!"); 
    } else if(input===""){ 
        alert("⚠️ Vui lòng nhập Key!");
    } else { 
        alert("❌ Key sai hoặc hết hạn!"); 
    }
}

function fakeFunc(name){ alert("✅ "+name+" đã kích hoạt!"); }
function toggleZalo(){ const p=document.getElementById("zaloPopup"); p.style.display=(p.style.display==="flex")?"none":"flex"; }

// Tạo snow effect
function createSnow() {
    const snow = document.getElementById('snow');
    for(let i=0;i<40;i++){
        let flake = document.createElement('div');
        flake.className='snowflake';
        let size = Math.random()*3+1+'px';
        flake.style.width=size; flake.style.height=size;
        flake.style.left=Math.random()*100+'vw';
        flake.style.animationDuration=Math.random()*3+4+'s';
        flake.style.animationDelay=Math.random()*5+'s';
        snow.appendChild(flake);
    }
}
createSnow();
</script>
