<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADVIP - SECURITY MASTER</title>
    <!-- FIX 1: Link thư viện chuẩn để hiện thông báo -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 radial-gradient(circle at 50% 50%, #2e1a2e 0%, #000 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        .snow-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .snowflake { position: absolute; background: #ff00ff; border-radius: 50%; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }

        .container { z-index: 1; width: 90%; max-width: 360px; text-align: center; }
        h1 { font-size: 42px; letter-spacing: 10px; text-shadow: 0 0 20px #ff00ff, 0 0 40px #800080; font-weight: 900; color: #fff; margin: 0; }

        .avatar-wrapper { position: relative; width: 130px; height: 130px; margin: 30px auto; }
        .avatar {
            width: 100%; height: 100%; background: #1c252a; border-radius: 50%; border: 4px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8); display: flex; justify-content: center; align-items: center;
            animation: pulse 2.5s infinite;
        }
        .avatar svg { width: 70px; height: 70px; fill: #ff00ff; filter: drop-shadow(0 0 10px #ff00ff); }
        
        @keyframes pulse { 
            0%, 100% { box-shadow: 0 0 15px #ff00ff; transform: scale(1); } 
            50% { box-shadow: 0 0 40px #ff00ff, 0 0 20px #fff; transform: scale(1.05); } 
        }

        input {
            width: 100%; padding: 18px; border-radius: 40px; border: 2px solid #4b0082;
            background: rgba(20, 0, 20, 0.8); color: #fff; margin-top: 25px;
            text-align: center; box-sizing: border-box; outline: none; font-size: 16px;
            transition: 0.3s; border-color: rgba(255, 0, 255, 0.3);
        }
        input:focus { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; background: rgba(40, 0, 40, 0.9); }

        .login-btn {
            width: 100%; padding: 18px; border-radius: 40px; border: none; margin-top: 20px;
            background: linear-gradient(45deg, #8a2be2, #ff007f);
            color: white; font-weight: bold; font-size: 18px; letter-spacing: 4px; cursor: pointer;
            box-shadow: 0 5px 25px rgba(255, 0, 255, 0.4); transition: 0.4s; text-transform: uppercase;
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 35px #ff00ff; filter: brightness(1.2); }

        .pink-popup { background: #1a001a !important; border: 3px solid #ff00ff !important; border-radius: 25px !important; }
        .pink-title { color: #fff !important; text-shadow: 0 0 10px #ff00ff !important; }
        .purple-confirm-btn { background: linear-gradient(45deg, #8a2be2, #ff007f) !important; border-radius: 30px !important; border: none !important; color: #fff !important; padding: 10px 30px !important; }

        .petal { position: absolute; width: 12px; height: 12px; background: #ffc0cb; border-radius: 150% 0 150% 150%; z-index: 9999; pointer-events: none; animation: petal-fall 3s linear forwards; }
        @keyframes petal-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(500px) rotate(720deg); opacity: 0; } }

        #zaloPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .popup-content { background: #1a001a; padding: 40px; border-radius: 30px; width: 85%; max-width: 320px; border: 2px solid #ff00ff; text-align: center; }
        
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .icon-box { width: 60px; height: 60px; cursor: pointer; transition: 0.4s; border-radius: 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,0,255,0.2); }
        .icon-box svg { width: 30px; height: 30px; fill: white; }
    </style>
</head>
<body>

<div class="snow-container" id="snow"></div>

<div class="container">
    <h1>HEADVIP</h1>
    <div class="avatar-wrapper">
        <div class="avatar">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"></path></svg>
        </div>
    </div>
    <div style="font-size: 14px; color: #ff00ff; letter-spacing: 6px; font-weight: bold;">LOGIN SYSTEM</div>
    <input type="password" id="keyInput" placeholder="Nhập Key (XXXXXX-XXX-XXXXXX)">
    <button class="login-btn" onclick="checkKey()">Access Login</button>
    <div style="margin-top: 40px; font-size: 11px; color: #ff00ff; letter-spacing: 4px; opacity: 0.8;">CONTACT ADMIN</div>
    <div class="social-icons">
        <div class="icon-box" onclick="toggleZalo()"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path></svg></div>
        <div class="icon-box" onclick="window.open('https://facebook.com', '_blank')"><svg viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"></path></svg></div>
    </div>
</div>

<div id="zaloPopup" onclick="toggleZalo()">
    <div class="popup-content" onclick="event.stopPropagation()">
        <h3 style="color:#ff00ff;">ADMIN ZALO</h3>
        <p style="font-size: 20px; color: #fff; font-weight: bold;">0347320672</p>
        <!-- FIX 2: Thay bằng link Box thực tế của bạn -->
        <a href="https://zalo.me" style="display:block; background:linear-gradient(45deg, #8a2be2, #ff007f); color:#fff; padding:16px; border-radius:40px; text-decoration:none; font-weight:bold; margin-top: 25px;" target="_blank">THAM GIA BOX VIP</a>
    </div>
</div>

<script>
    const listKeys = ["PhamSon-ViP-K9A2M1", "PhamSon-ViP-H5N8B3", "PhamSon-ViP-P1Q7R4", "PhamSon-ViP-X9Y2Z6", "PhamSon-ViP-S3T5U1", "PhamSon-ViP-F8G2H4", "PhamSon-ViP-J1K9L5", "PhamSon-ViP-M6N2P8", "PhamSon-ViP-V3W7X1", "PhamSon-ViP-A5S2D8", "PhamSon-ViP-E4R6T1", "PhamSon-ViP-U9I2O4", "PhamSon-ViP-G7H1J3", "PhamSon-ViP-B5N9M2", "PhamSon-ViP-C1V3X5", "PhamSon-ViP-R4W7X9", "PhamSon-ViP-L2P1Q8", "PhamSon-ViP-J5K3M9", "PhamSon-ViP-T7V8N1", "PhamSon-ViP-G2H4J6", "PhamSon-ViP-D5F7K9", "PhamSon-ViP-A3C1E9", "PhamSon-ViP-Q8R2S4", "PhamSon-ViP-Z1X3C5", "PhamSon-ViP-Y7U9I2", "PhamSon-ViP-N1M3B5", "PhamSon-ViP-O8L2K4", "PhamSon-ViP-P9I1U5", "PhamSon-ViP-T2R4E6", "PhamSon-ViP-W1Q8Z3"];

    function checkKey() {
        const key = document.getElementById("keyInput").value.trim();
        if (listKeys.includes(key)) {
            Swal.fire({
                title: 'XÁC THỰC THÀNH CÔNG',
                text: 'Hệ thống đang mở khóa...',
                icon: 'success',
                confirmButtonText: 'VÀO NGAY',
                customClass: { popup: 'pink-popup', title: 'pink-title', confirmButton: 'purple-confirm-btn' }
            }).then(() => { window.location.href = "https://zalo.me"; });
            for(let i=0; i<30; i++) setTimeout(createPetal, i * 100);
        } else {
            Swal.fire({
                title: 'LỖI TRUY CẬP',
                text: 'Key không chính xác!',
                icon: 'error',
                confirmButtonText: 'THỬ LẠI',
                customClass: { popup: 'pink-popup', title: 'pink-title', confirmButton: 'purple-confirm-btn' }
            });
        }
    }

    function toggleZalo() {
        const p = document.getElementById("zaloPopup");
        p.style.display = (p.style.display === "flex") ? "none" : "flex";
    }

    function createPetal() {
        const p = document.createElement("div");
        p.className = "petal";
        p.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3000);
    }

    function initSnow() {
        const c = document.getElementById("snow");
        for (let i = 0; i < 40; i++) {
            const f = document.createElement("div");
            f.className = "snowflake";
            f.style.left = Math.random() * 100 + "vw";
            f.style.top = Math.random() * 100 + "vh";
            f.style.width = f.style.height = Math.random() * 4 + 2 + "px";
            f.style.animationDuration = Math.random() * 5 + 5 + "s";
            c.appendChild(f);
        }
    }
    initSnow();
</script>
</body>
</html>
