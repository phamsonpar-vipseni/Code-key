    animation: pulse 2.5s infinite;
}
.avatar svg { width: 70px; fill: #ff00ff; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 10px #ff00ff; } 50% { box-shadow: 0 0 30px #ff00ff, 0 0 15px #fff; } }

/* === INPUT === */
input {
    width: 100%; padding: 18px; border-radius: 40px; border: 2px solid #4b0082;

input:focus { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }

/* === BUTTON === */
.login-btn {

    background: linear-gradient(45deg, #8a2be2, #ff007f);
    color: white; font-weight: bold; font-size: 17px; letter-spacing: 4px; cursor: pointer;
    box-shadow: 0 5px 25px rgba(255, 0, 255, 0.3); transition: 0.3s;
}
.login-btn:hover { transform: scale(1.02); box-shadow: 0 5px 30px #ff00ff; }

/* === SOCIAL ICONS === */
.social-icons { display: flex; justify-content: center; gap: 40px; margin-top: 35px; }
.icon-box { width: 55px; height: 55px; cursor: pointer; transition: 0.4s; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; }
.icon-box:hover { transform: translateY(-8px) scale(1.1); box-shadow: 0 0 20px #ff00ff; }
.icon-box svg { width: 32px; height: 32px; fill: white; }

/* === ZALO POPUP === */
