<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADVIP LOGIN</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 0;
        }

        .container { z-index: 1; width: 90%; max-width: 350px; text-align: center; }
        .back-btn { font-size: 14px; margin-bottom: 10px; cursor: pointer; opacity: 0.6; }

        h1 {
            font-size: 35px; letter-spacing: 6px; margin: 0;
            text-shadow: 0 0 20px rgba(68, 134, 206, 0.6);
        }

        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin: 25px auto; }
        .avatar {
            width: 100%; height: 100%;
            background: url('https://cdn-icons-png.flaticon.com') center/cover; 
            border-radius: 50%; border: 2px solid #333;
        }
        .settings-icon {
            position: absolute; bottom: 5px; right: 5px;
            background: #444; border-radius: 50%; padding: 4px;
            width: 18px; height: 18px; border: 1px solid #222;
        }

        input {
            width: 100%; padding: 16px; border-radius: 35px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; margin-bottom: 15px;
            text-align: center; box-sizing: border-box; outline: none; font-size: 16px;
        }

        .login-btn {
            width: 100%; padding: 15px; border-radius: 35px; border: none;
            background: #4486ce; color: white; font-weight: bold;
            font-size: 16px; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .login-btn:hover { background: #3572b5; transform: scale(1.02); }

        /* CONTACT SECTION */
        .social-icons { display: flex; justify-content: center; gap: 35px; margin-top: 25px; }
        .social-icons img { 
            width: 55px; height: 55px; 
            cursor: pointer; transition: 0.3s; 
            border-radius: 12px; /* Bo góc icon cho giống ảnh bạn gửi */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .social-icons img:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* Zalo Popup */
        #zaloPopup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .popup-content {
            background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%; max-width: 320px;
            border: 1px solid #0068ff; text-align: center;
        }
        .popup-btn {
            display: block; background: #0068ff; color: white; padding: 12px;
            margin-top: 20px; border-radius: 30px; text-decoration: none; font-weight: bold;
        }

        .footer { margin-top: 40px; font-size: 11px; opacity: 0.3; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="back-btn" onclick="history.back()">← Back</div>
    <h1>HEADVIP</h1>
    
    <div class="avatar-wrapper">
        <div class="avatar"></div>
        <img class="settings-icon" src="https://cdn-icons-png.flaticon.com" alt="settings">
    </div>

    <div style="font-size: 12px; letter-spacing: 4px; margin-bottom: 20px; font-weight: bold; opacity: 0.9;">KEY LOGIN</div>

    <input type="text" id="key" placeholder="Enter your key...">
    <button class="login-btn" onclick="checkKey()">LOGIN</button>

    <div style="margin-top: 50px; font-size: 11px; letter-spacing: 5px; opacity: 0.4;">CONTACT</div>
    
    <div class="social-icons">
        <!-- Đã thêm đúng ảnh Zalo ông gửi -->
        <img src="https://upload.wikimedia.org" onclick="toggleZalo()" alt="Zalo">
        
        <!-- Đã thêm đúng ảnh Facebook ông gửi -->
        <a href="https://www.facebook.com" target="_blank">
            <img src="https://upload.wikimedia.org" alt="Facebook">
        </a>
    </div>

    <div class="footer">by PhTrgSon</div>
</div>

<div id="zaloPopup" onclick="toggleZalo()">
    <div class="popup-content" onclick="event.stopPropagation()">
        <h3 style="color:#0068ff">THÔNG TIN ZALO</h3>
        <div style="margin: 15px 0; font-size: 18px;">SĐT: <b>0347320672</b></div>
        <a href="https://zalo.me" class="popup-btn" target="_blank">VÀO BOX ZALO</a>
        <span style="color:#555; cursor:pointer; display:block; margin-top:15px" onclick="toggleZalo()">[ Đóng ]</span>
    </div>
</div>

<script>
    function checkKey(){
        var keyInput = document.getElementById("key").value;
        if(keyInput.startsWith("PhamSon-Vip-")){
            alert("Login thành công!");
        } else {
            alert("Đéo Buy Còn Đòi Nhập !");
        }
    }

    function toggleZalo() {
        var popup = document.getElementById("zaloPopup");
        popup.style.display = (popup.style.display === "flex") ? "none" : "flex";
    }
</script>

</body>
</html>
