<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<style>

}

.container{
  margin-top:50px;

}

h1{

}

.sub{
  opacity:0.7;
  margin-bottom:20px;
}

.box{

}

  width:90%;

  border:none;
  border-radius:20px;

<body>

<div class="container">
  <h1>AimTrickHead Signature</h1>
  <div class="sub">Key Active By Huy Fanta</div>

  <div class="box">
    <h3>Đăng nhập Key Đi Mấy Ní</h3>

    <input id="key" placeholder="Nhập Key Vào Đây Đi Nè">

    <button onclick="login()">Đăng nhập</button>

    <div class="link">Zalo</div>
    <div class="link">Facebook</div>
  </div>
</div>

<script>
// ===== 30 KEY =====

"PhamTrgSon-Seni-JK7LP","PhamTrgSon-Seni-ZQ9WX","PhamTrgSon-Seni-VB2NM"

// ===== LOGIN =====
function login(){
  let key = document.getElementById("key").value.trim();

  if(!key){
    alert("Nhập key đi");
    return;
  }

  if(!key.startsWith("PhamTrgSon-Seni-") || key.length !== 22){
    alert("Sai định dạng key");
    return;
  }

  if(VALID_KEYS.includes(key)){
    alert("Key đúng");

    localStorage.setItem("login","true");
    localStorage.setItem("key",key);

  }else{
    alert("Key sai");
  }
}
</script>
